<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <!-- Indicar la ruta absoluta al archivo config.yml para evitar errores 404 al acceder sin barra diagonal final -->
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <script>
      // Desactivar la autoinicialización automática de Decap CMS
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- Script Interceptor de Red (Fetch) para aplanar y estructurar arrays JSON transparentemente -->
    <script>
      (function() {
        const originalFetch = window.fetch;

        window.fetch = async function (resource, options) {
          let url = typeof resource === 'string' ? resource : resource.url;
          let isLocalProxy = url.includes('/api/v1') || url.includes(':8081');
          let isGithubAPI = url.includes('api.github.com/repos/') && url.includes('/contents/src/data/') && url.endsWith('.json');

          // 1. Interceptar peticiones de escritura locales al proxy de decap-server
          if (isLocalProxy && options && options.body) {
            try {
              const bodyObj = JSON.parse(options.body);
              
              if (bodyObj.action === 'persistEntry' && bodyObj.params && Array.isArray(bodyObj.params.dataFiles)) {
                let modified = false;
                bodyObj.params.dataFiles.forEach(file => {
                  if (file.path && file.path.endsWith('.json') && file.raw) {
                    try {
                      const rawData = JSON.parse(file.raw);
                      if (rawData && Array.isArray(rawData.items)) {
                        console.log("[Fetch Interceptor] Escritura local detectada para archivo:", file.path);
                        file.raw = JSON.stringify(rawData.items, null, 2);
                        modified = true;
                      }
                    } catch (e) {
                      console.error("[Fetch Interceptor] Error parseando rawData local:", e);
                    }
                  }
                });
                if (modified) {
                  options.body = JSON.stringify(bodyObj);
                }
              }
            } catch (e) {
              console.error("[Fetch Interceptor] Error en request local:", e);
            }
          }

          // 2. Interceptar peticiones de escritura a la API de GitHub (Producción)
          if (isGithubAPI && options && options.method === 'PUT' && options.body) {
            try {
              const bodyObj = JSON.parse(options.body);
              if (bodyObj.content) {
                const decodedContent = decodeURIComponent(escape(atob(bodyObj.content.replace(/\s/g, ''))));
                const rawData = JSON.parse(decodedContent);
                if (rawData && Array.isArray(rawData.items)) {
                  console.log("[Fetch Interceptor] Escritura GitHub detectada para:", url);
                  const cleanArrayStr = JSON.stringify(rawData.items, null, 2);
                  const base64Str = btoa(unescape(encodeURIComponent(cleanArrayStr)));
                  bodyObj.content = base64Str;
                  options.body = JSON.stringify(bodyObj);
                }
              }
            } catch (e) {
              console.error("[Fetch Interceptor] Error en request GitHub:", e);
            }
          }

          // Realizar la llamada de red original
          const response = await originalFetch(resource, options);

          // 3. Interceptar respuestas de lectura del proxy local (getEntry)
          if (isLocalProxy && options && options.body) {
            try {
              const bodyObj = JSON.parse(options.body);
              if (bodyObj.action === 'getEntry' && bodyObj.params && bodyObj.params.path.endsWith('.json')) {
                const cloneRes = response.clone();
                const resData = await cloneRes.json();
                if (resData && resData.data) {
                  const parsedData = JSON.parse(resData.data);
                  if (Array.isArray(parsedData)) {
                    console.log("[Fetch Interceptor] Lectura local detectada para:", bodyObj.params.path);
                    resData.data = JSON.stringify({ items: parsedData });
                    return new Response(JSON.stringify(resData), {
                      status: response.status,
                      statusText: response.statusText,
                      headers: response.headers
                    });
                  }
                }
              }
            } catch (e) {
              console.error("[Fetch Interceptor] Error en response local:", e);
            }
          }

          // 4. Interceptar respuestas de lectura de GitHub API (GET contents)
          if (isGithubAPI && (!options || options.method === 'GET' || !options.method)) {
            try {
              const cloneRes = response.clone();
              const resData = await cloneRes.json();
              if (resData && resData.content) {
                const decodedContent = decodeURIComponent(escape(atob(resData.content.replace(/\s/g, ''))));
                const parsedData = JSON.parse(decodedContent);
                if (Array.isArray(parsedData)) {
                  console.log("[Fetch Interceptor] Lectura GitHub detectada para:", url);
                  const wrappedDataStr = JSON.stringify({ items: parsedData });
                  const base64Str = btoa(unescape(encodeURIComponent(wrappedDataStr)));
                  resData.content = base64Str;
                  return new Response(JSON.stringify(resData), {
                    status: response.status,
                    statusText: response.statusText,
                    headers: response.headers
                  });
                }
              }
            } catch (e) {
              console.error("[Fetch Interceptor] Error en response GitHub:", e);
            }
          }

          return response;
        };
      })();
    </script>

    <!-- script de lógica de autogeneración de campos (slug, detailsLink, buyLink) -->
    <script>
      // Helper para hacer slugify
      function slugify(text) {
        return text
          .toString()
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '') // Quitar acentos
          .replace(/\s+/g, '-')           // Reemplazar espacios por guiones
          .replace(/[^\w\-]+/g, '')       // Quitar caracteres no válidos
          .replace(/\-\-+/g, '-')         // Quitar guiones duplicados
          .replace(/^-+/, '')             // Quitar guiones del inicio
          .replace(/-+$/, '');            // Quitar guiones del final
      }

      // Helper para actualizar inputs en React de forma segura
      function setReactInputValue(input, value) {
        if (!input) return;
        const lastValue = input.value;
        input.value = value;
        const tracker = input._valueTracker;
        if (tracker) {
          tracker.setValue(lastValue);
        }
        input.dispatchEvent(new Event('input', { bubbles: true }));
        input.dispatchEvent(new Event('change', { bubbles: true }));
      }

      // Inicializar el observador para autocompletar campos
      function initAutoFieldsObserver() {
        const observer = new MutationObserver(() => {
          // Detectar en qué colección estamos por el hash
          const hash = window.location.hash;
          let category = '';
          if (hash.includes('/collections/books')) category = 'libros';
          else if (hash.includes('/collections/packs')) category = 'packs';
          else if (hash.includes('/collections/exams')) category = 'examenes-internacionales';
          
          if (!category) return;

          // Buscar todos los bloques de items del widget list del CMS
          const listItems = document.querySelectorAll('div[class*="ListItem-listControlItem"]');
          listItems.forEach(item => {
            // Buscar los inputs dentro de este list item
            const titleInput = item.querySelector('input[id^="title-field-"]');
            const idInput = item.querySelector('input[id^="id-field-"]');
            const detailsLinkInput = item.querySelector('input[id^="detailsLink-field-"]');
            const buyLinkInput = item.querySelector('input[id^="buyLink-field-"]');

            if (titleInput) {
              // Si no tiene el listener asignado, se lo asignamos
              if (!titleInput.dataset.autoFieldsBound) {
                titleInput.dataset.autoFieldsBound = 'true';
                
                titleInput.addEventListener('input', () => {
                  const titleVal = titleInput.value;
                  const slug = slugify(titleVal);

                  // Si el ID está vacío o tiene el mismo valor anterior al cambio, lo autogeneramos
                  if (idInput && (!idInput.value || idInput.value === slugify(titleInput.defaultValue || ''))) {
                    setReactInputValue(idInput, slug);
                  }
                  
                  // Generar enlaces si existen los inputs y están vacíos o tienen valores por defecto
                  if (slug) {
                    if (detailsLinkInput && (!detailsLinkInput.value || detailsLinkInput.value.includes('/catalogo/'))) {
                      setReactInputValue(detailsLinkInput, `/catalogo/${category}/${slug}`);
                    }
                    if (buyLinkInput && (!buyLinkInput.value || buyLinkInput.value.includes('/checkout/'))) {
                      setReactInputValue(buyLinkInput, `/checkout/${slug}`);
                    }
                  }
                });
              }
            }
          });
        });

        observer.observe(document.body, { childList: true, subtree: true });
      }
    </script>

    <!-- Incluye el script de Decap CMS de forma nativa desde unpkg -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Integración con Cloudinary Media Library -->
    <script src="https://unpkg.com/decap-cms-media-library-cloudinary@^1.3.0/dist/decap-cms-media-library-cloudinary.js"></script>
    <script>
      // Detectar si estamos en desarrollo local
      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const initOptions = {};

      if (isLocal) {
        console.log("[CMS Init] Detectado entorno local. Configurando backend de proxy local...");
        initOptions.config = {
          backend: {
            name: 'proxy',
            proxy_url: 'http://localhost:8081/api/v1'
          },
          local_backend: true
        };
      } else {
        console.log("[CMS Init] Detectado entorno de producción. Usando backend de GitHub configurado en config.yml.");
      }

      // Inicializar manualmente el CMS con las opciones dinámicas
      CMS.init(initOptions);

      // Registrar estilos y plantillas de previsualización
      CMS.registerPreviewStyle("/admin/preview.css");

      // React class para previsualizar productos (Libros, Packs, Exámenes)
      const ProductPreview = createClass({
        render: function() {
          const entry = this.props.entry;
          const h = window.h;

          // Obtener los items de la lista de la colección (libros, packs, exams, etc.)
          const items = entry.getIn(['data', 'items']);

          if (!items || items.size === 0) {
            return h('div', { className: 'preview-container' },
              h('div', { className: 'book-card' },
                h('div', { className: 'card-content' },
                  h('h3', { className: 'book-title' }, 'No hay productos ingresados')
                )
              )
            );
          }

          // Mapear cada elemento de la lista para renderizar su tarjeta correspondiente
          return h('div', { className: 'preview-container' },
            items.map((item, index) => {
              const title = item.get('title');
              const id = item.get('id');
              const price = item.get('price') || 0;
              const description = item.get('description');
              const coverImage = item.get('coverImage');
              const discount = item.get('discount') || 0;
              const level = item.get('level');
              const featured = item.get('featured');
              const includedItems = item.get('includedItems');

              // Calcular precio final con descuento si aplica
              let finalPrice = price;
              if (price && discount) {
                finalPrice = price * (1 - discount / 100);
              }

              const formattedPrice = `S/${price.toFixed(2)}`;
              const formattedFinalPrice = `S/${finalPrice.toFixed(2)}`;

              return h('div', { key: index, className: 'book-card' + (featured ? ' featured-card' : '') },
                h('div', { className: 'book-cover-container' },
                  coverImage ? h('img', { src: coverImage, className: 'book-cover', alt: title }) : h('div', { className: 'book-cover-placeholder' }, 'Portada de producto'),
                  featured ? h('div', { className: 'card-badge-left' }, 'Recomendado') : null,
                  level ? h('div', { className: 'card-badge-right' }, level) : null,
                  discount > 0 ? h('div', { className: 'discount-badge-ribbon' }, discount + '% OFF') : null
                ),
                h('div', { className: 'card-content' },
                  h('h3', { className: 'book-title' }, title || 'Sin título ingresado'),
                  h('p', { className: 'book-description' }, description || 'Sin descripción ingresada...'),
                  h('div', { className: 'price-display' },
                    h('span', { className: 'discounted-price' }, formattedFinalPrice),
                    discount > 0 ? h('span', { className: 'original-price' }, formattedPrice) : null,
                    discount > 0 ? h('span', { className: 'discount-tag' }, discount + '% OFF') : null
                  ),
                  includedItems && includedItems.size > 0 ? h('div', { className: 'included-content' },
                    h('p', { className: 'included-content-title' }, 'Incluye:'),
                    h('ul', { className: 'included-list' }, includedItems.map((incItem, idx) => {
                      const text = typeof incItem === 'string' ? incItem : incItem.get('item');
                      return h('li', { key: idx, className: 'included-item' }, 
                        h('span', { className: 'included-item-check' }, '✓'),
                        ' ',
                        text
                      );
                    }))
                  ) : null,
                  h('div', { className: 'action-buttons' },
                    h('button', { className: 'btn-primary' }, 'Comprar'),
                    h('button', { className: 'btn-outline' }, 'Ver Detalles')
                  )
                )
              );
            }).toArray()
          );
        }
      });

      // React class para previsualizar editoriales
      const EditorialPreview = createClass({
        render: function() {
          const entry = this.props.entry;
          const h = window.h;
          const items = entry.getIn(['data', 'items']);

          if (!items || items.size === 0) return h('div', null, 'No hay editoriales registradas');

          return h('div', { className: 'preview-container' },
            items.map((item, index) => {
              const name = item.get('name');
              const description = item.get('description');
              return h('div', { key: index, className: 'editorial-card' },
                h('h3', { className: 'editorial-title' }, name || 'Sin nombre'),
                h('p', { className: 'editorial-desc' }, description || 'Sin descripción')
              );
            }).toArray()
          );
        }
      });

      // React class para previsualizar categorías
      const CategoryPreview = createClass({
        render: function() {
          const entry = this.props.entry;
          const h = window.h;
          const items = entry.getIn(['data', 'items']);

          if (!items || items.size === 0) return h('div', null, 'No hay categorías registradas');

          return h('div', { className: 'preview-container' },
            items.map((item, index) => {
              const name = item.get('name');
              const description = item.get('description');
              const icon = item.get('icon');
              return h('div', { key: index, className: 'category-card' },
                h('div', { className: 'category-icon-wrapper' }, icon ? icon.charAt(0) : '★'),
                h('h3', { className: 'category-title' }, name || 'Sin nombre'),
                h('p', { className: 'category-desc' }, description || 'Sin descripción'),
                h('span', { className: 'category-btn' }, 'Ver Colección')
              );
            }).toArray()
          );
        }
      });

      // React class para previsualizar testimonios
      const TestimonyPreview = createClass({
        render: function() {
          const entry = this.props.entry;
          const h = window.h;
          const items = entry.getIn(['data', 'items']);

          if (!items || items.size === 0) return h('div', null, 'No hay testimonios registrados');

          return h('div', { className: 'preview-container' },
            items.map((item, index) => {
              const quote = item.get('quote');
              const author = item.get('author');
              const position = item.get('position');
              const avatarUrl = item.get('avatarUrl');
              const rating = item.get('rating') || 5;

              const stars = '★'.repeat(rating) + '☆'.repeat(Math.max(0, 5 - rating));

              return h('div', { key: index, className: 'testimony-card' },
                h('p', { className: 'testimony-quote' }, quote || 'Sin testimonio...'),
                h('div', { className: 'testimony-author-info' },
                  avatarUrl ? h('img', { src: avatarUrl, className: 'testimony-avatar', alt: author }) : h('div', { className: 'testimony-avatar', style: { display: 'flex', alignItems: 'center', justifyContent: 'center', backgroundColor: '#e5e7eb', color: '#6b7280' } }, '👤'),
                  h('div', { className: 'testimony-author-text' },
                    h('span', { className: 'testimony-name' }, author || 'Anónimo'),
                    h('span', { className: 'testimony-position' }, position || 'Estudiante'),
                    h('span', { className: 'testimony-rating' }, stars)
                  )
                )
              );
            }).toArray()
          );
        }
      });

      // React class para previsualizar ofertas
      const OfferPreview = createClass({
        render: function() {
          const entry = this.props.entry;
          const h = window.h;
          const items = entry.getIn(['data', 'items']);

          if (!items || items.size === 0) return h('div', null, 'No hay ofertas registradas');

          return h('div', { className: 'preview-container' },
            items.map((item, index) => {
              const title = item.get('title');
              const description = item.get('description');
              const image = item.get('image');
              const originalPrice = item.get('originalPrice') || 0;
              const salePrice = item.get('salePrice') || 0;
              const discount = item.get('discount');

              return h('div', { key: index, className: 'offer-card' },
                image ? h('img', { src: image, className: 'offer-image', alt: title }) : h('div', { className: 'offer-image', style: { display: 'flex', alignItems: 'center', justifyContent: 'center', backgroundColor: '#f3f4f6', color: '#9ca3af' } }, 'Oferta'),
                h('div', { className: 'offer-details' },
                  h('h3', { className: 'offer-title' }, title || 'Oferta especial'),
                  h('p', { className: 'offer-desc' }, description || 'Descripción de la oferta...'),
                  h('div', { className: 'offer-pricing' },
                    h('span', { className: 'offer-sale-price' }, 'S/ ' + salePrice.toFixed(2)),
                    originalPrice ? h('span', { className: 'offer-original-price' }, 'S/ ' + originalPrice.toFixed(2)) : null,
                    discount ? h('span', { className: 'offer-discount-tag' }, discount + '% OFF') : null
                  )
                )
              );
            }).toArray()
          );
        }
      });

      // React class para previsualizar FAQs
      const FaqPreview = createClass({
        render: function() {
          const entry = this.props.entry;
          const h = window.h;
          const items = entry.getIn(['data', 'items']);

          if (!items || items.size === 0) return h('div', null, 'No hay preguntas ingresadas');

          return h('div', { className: 'preview-container' },
            h('div', { className: 'faq-container' },
              items.map((item, index) => {
                const question = item.get('question');
                const answer = item.get('answer');
                return h('div', { key: index, className: 'faq-item' },
                  h('h4', { className: 'faq-question' }, (index + 1) + '. ' + (question || 'Pregunta sin definir')),
                  h('p', { className: 'faq-answer' }, answer || 'Sin respuesta redactada...')
                );
              }).toArray()
            )
          );
        }
      });

      CMS.registerPreviewTemplate("books", ProductPreview);
      CMS.registerPreviewTemplate("packs", ProductPreview);
      CMS.registerPreviewTemplate("exams", ProductPreview);
      CMS.registerPreviewTemplate("editorial", EditorialPreview);
      CMS.registerPreviewTemplate("categories", CategoryPreview);
      CMS.registerPreviewTemplate("testimonies", TestimonyPreview);
      CMS.registerPreviewTemplate("offers", OfferPreview);
      CMS.registerPreviewTemplate("generalFaqs", FaqPreview);
      CMS.registerPreviewTemplate("catalogFaqs", FaqPreview);
      CMS.registerPreviewTemplate("paymentFaqs", FaqPreview);

      // Iniciar MutationObserver para la autogeneración de campos
      initAutoFieldsObserver();
    </script>
  </body>
</html>
