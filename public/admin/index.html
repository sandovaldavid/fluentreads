<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Register custom format 'json-array' for top-level JSON arrays
      window.CMS.registerFormat('json-array', 'json', {
        fromFile: function (content) {
          try {
            return { items: JSON.parse(content) };
          } catch (e) {
            return { items: [] };
          }
        },
        toFile: function (data) {
          return JSON.stringify(data.items, null, 2);
        },
      });
    </script>
  </head>
  <body></body>
</html>
