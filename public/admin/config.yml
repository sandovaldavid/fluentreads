backend:
  name: github
  repo: sandovaldavid/fluentreads
  branch: feat/b9-decap-cms
local_backend: true
media_folder: public/images
public_folder: /images
collections:
  - name: books
    label: Libros
    files:
      - label: Libros
        name: books
        file: src/data/books.json
        format: json
        fields:
          - label: Libros
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label: Título
                name: title
                widget: string
              - label: Descripción
                name: description
                widget: text
              - label: Precio (S/)
                name: price
                widget: number
                value_type: float
              - label: Editorial
                name: editorialId
                widget: select
                options:
                  - { label: 'Cambridge University Press', value: 'cambridge' }
                  - { label: 'Oxford University Press', value: 'oxford' }
                  - { label: 'Pearson Education', value: 'pearson' }
                  - { label: 'Longman', value: 'longman' }
                  - { label: 'Penguin Random House', value: 'penguin' }
                  - { label: 'HarperCollins', value: 'harpercollins' }
                  - { label: "Barron's Educational Series", value: 'barrons' }
                  - { label: 'Kaplan Publishing', value: 'kaplan' }
                  - { label: 'Macmillan Education', value: 'macmillan' }
                  - { label: 'Cengage Learning', value: 'cengage' }
                  - { label: 'Heinemann', value: 'heinemann' }
              - label: Descuento (%)
                name: discount
                widget: number
                value_type: int
                default: 0
                required: false
              - label: Días de Oferta
                name: offerDays
                widget: number
                value_type: int
                default: 7
                required: false
              - label: Imagen de Portada (URL)
                name: coverImage
                widget: string
              - label: Texto Alternativo de Imagen
                name: altText
                widget: string
                required: false
              - label: Imágenes de Galería (URLs)
                name: images
                widget: list
                required: false
              - label: Video (URL Embed)
                name: video
                widget: string
                required: false
              - label: Calificación
                name: rating
                widget: object
                required: false
                fields:
                  - label: Puntuación
                    name: score
                    widget: number
                    value_type: float
                  - label: Cantidad de Reseñas
                    name: reviewCount
                    widget: number
                    value_type: int
              - label: Nivel
                name: level
                widget: select
                required: false
                options:
                  - basic
                  - beginner
                  - intermediate
                  - advanced
                  - professional
                  - all-levels
                  - international-exam
              - label: Tags de Formato
                name: formatTags
                widget: select
                multiple: true
                required: false
                options:
                  - pdf
                  - workbook
                  - audio
                  - video
                  - software
                  - exams
              - label: Tags de Popularidad
                name: popularityTags
                widget: select
                multiple: true
                required: false
                options:
                  - bestSeller
                  - new
                  - specialOffer
                  - completePack
                  - recommended
              - label: Destacado
                name: featured
                widget: boolean
                default: false
                required: false
              - label: Enlace de Detalles
                name: detailsLink
                widget: string
              - label: Enlace de Compra
                name: buyLink
                widget: string
              - label: Elementos Incluidos
                name: includedItems
                widget: list
  - name: packs
    label: Packs de Estudio
    files:
      - label: Packs de Estudio
