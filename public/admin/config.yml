              - label: Imagen de Portada (URL)
                name: coverImage
                widget: string
              - label: Texto Alternativo de Imagen
                name: altText
                widget: string
                required: false
              - label: Imágenes de Galería (URLs)
                name: images
                widget: list
                required: false
              - label: Video (URL Embed)
                name: video
                widget: string
                required: false
              - label: IDs de Libros Incluidos
                name: booksIds
                widget: list
              - label: Calificación
                name: rating
                widget: object
                required: false
                fields:
                  - label: Puntuación
                    name: score
                    widget: number
                    value_type: float
                  - label: Cantidad de Reseñas
                    name: reviewCount
                    widget: number
                    value_type: int
              - label: Nivel
                name: level
