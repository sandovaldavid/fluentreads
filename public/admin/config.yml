  - name: editorial
    label: Editoriales
    files:
      - label: Editoriales
        name: editorial
        file: src/data/editorial.json
        format: json
        fields:
          - label: Editoriales
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label: Nombre
                name: name
                widget: string
              - label: Descripción
                name: description
                widget: text
  - name: testimonies
    label: Testimonios
    files:
      - label: Testimonios
        name: testimonies
        file: src/data/testimonies.json
        format: json
        fields:
          - label: Testimonios
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label: Cita
                name: quote
                widget: text
              - label: Autor
                name: author
                widget: string
              - label: Cargo/Posición
                name: position
                widget: string
              - label: URL de Avatar
                name: avatarUrl
                widget: string
              - label: Calificación (1-5)
                name: rating
                widget: number
                value_type: int
              - label: Fecha
                name: date
                widget: datetime
                format: YYYY-MM-DD
  - name: offers
    label: Ofertas Especiales
    files:
      - label: Ofertas Especiales
        name: offers
        file: src/data/offers.json
        format: json
        fields:
          - label: Ofertas
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label: Título
                name: title
                widget: string
              - label: Descripción
                name: description
                widget: text
              - label: Descuento (%)
                name: discount
                widget: number
                value_type: int
              - label: Precio Original (S/)
                name: originalPrice
                widget: number
                value_type: float
              - label: Precio de Venta (S/)
                name: salePrice
                widget: number
                value_type: float
              - label: Imagen
                name: image
                widget: string
              - label: Enlace
                name: link
                widget: string
  - name: categories
    label: Categorías de Catálogo
    files:
      - label: Categorías de Catálogo
        name: categories
        file: src/data/categories.json
        format: json
        fields:
          - label: Categorías
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label: Nombre
                name: name
                widget: string
              - label: Descripción
                name: description
                widget: text
              - label: Icono
                name: icon
                widget: select
                options:
                  - Book
                  - Books
                  - GraduationCap
              - label: Imagen
                name: image
                widget: string
              - label: Enlace
                name: link
                widget: string
  - name: generalFaqs
    label: FAQs Generales
    files:
      - label: FAQs Generales
        name: generalFaqs
        file: src/data/general-faqs.json
        format: json
        fields:
          - label: Preguntas
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label: Pregunta
                name: question
                widget: string
              - label: Respuesta
                name: answer
