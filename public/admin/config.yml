                  - workbook
                  - audio
                  - video
                  - software
                  - exams
              - label: Tags de Popularidad
                name: popularityTags
                widget: select
                multiple: true
                required: false
                options:
                  - bestSeller
                  - new
                  - specialOffer
                  - completePack
                  - recommended
              - label: Destacado
                name: featured
                widget: boolean
                default: false
                required: false
              - label: Enlace de Detalles
                name: detailsLink
                widget: string
              - label: Enlace de Compra
                name: buyLink
                widget: string
              - label: Elementos Incluidos
                name: includedItems
                widget: list
  - name: exams
