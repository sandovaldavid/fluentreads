    files:
      - label: Banner Hero de Ofertas
        name: offerHeroBanner
        file: src/data/offer-hero-banner.json
        format: json
        fields:
          - label: Banners
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label: Tipo de Producto
                name: type
                widget: select
                options:
                  - book
                  - pack
                  - exam
              - label: Fecha de Expiración
                name: expiration
                widget: datetime
                format: YYYY-MM-DD
              - label: Enlace Personalizado
                name: customLink
                widget: string
  - name: legal
    label: Páginas Legales
    folder: src/content/legal
    create: true
    slug: '{{slug}}'
    format: frontmatter
    fields:
      - label: Título
        name: title
        widget: string
      - label: Descripción
        name: description
        widget: string
        required: false
      - label: Cuerpo
        name: body
        widget: markdown
