name: release-please-develop

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please/config-develop.json
          manifest-file: .github/release-please/manifest-develop.json
          target-branch: develop
